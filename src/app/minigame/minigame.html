<div class="modal-overlay">
  <div class="minigame-modal">
    <button class="close-btn" (click)="fecharModal()">×</button>
    <div class="minigame-phase">OITAVAS DE FINAL</div>

    <div class="scoreboard">
      <div class="team-display">
        <img [src]="partidaAtual.timeA.bandeira" class="big-flag" />
        {{ partidaAtual.timeA.nome }}
      </div>

      <div class="score-display">
        <span>{{ placarA }}</span>
        <span class="score-x">x</span>
        <span>{{ placarB }}</span>
      </div>

      <div class="team-display">
        <img [src]="partidaAtual.timeB.bandeira" class="big-flag" />
        {{ partidaAtual.timeB.nome }}
      </div>
    </div>

    <div
      class="feedback-msg"
      [ngClass]="{
        'win-text': statusResultado === 'ganhou',
        'lose-text': statusResultado === 'perdeu',
        goal: mensagemAviso.includes('GOLAÇO'),
      }"
    >
      {{ mensagemAviso }}
    </div>

    <div class="minigame-container">
      <div class="minigame-bar">
        <div class="target-zone"></div>
        <div class="cursor-block" [style.left.%]="posicaoCursor"></div>
      </div>
    </div>

    <button class="btn-green btn-chutar" (click)="chutar()" [disabled]="!podeChutar">
      {{ podeChutar ? 'CHUTAR!' : 'AGUARDE...' }}
    </button>
  </div>
</div>
